# tanka-wm — release pipeline: cross-compile 6 self-contained binaries → publish to GitHub Releases.
#
# Trigger: push a tag on the dev branch to release; regular pushes / PRs do not trigger.
# The tagged commit must be on the dev branch, otherwise the build job fails
# (prevents accidental releases from other branches).
#   git checkout dev
#   git tag v1.0.0
#   git push origin v1.0.0
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   TANKA_API_URL_PROD  — required, production API base URL
#   TANKA_API_URL_DEV   — optional, dev env URL (omit to exclude from binary)
#   TANKA_API_URL_TEST  — optional, test env URL
#   TANKA_API_URL_UAT   — optional, uat env URL

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history for branch ancestry check

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Only release tags on the dev branch
      - name: Verify tag is on dev branch
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/dev; then
            echo "✗ tag $TAG_NAME is not on the dev branch — this pipeline only releases dev branch tags"
            exit 1
          fi
          echo "✓ tag $TAG_NAME is on the dev branch"

      # package.json is the version source of truth — tag must match
      - name: Verify tag matches package.json version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(bun -e 'console.log(require("./package.json").version)')
          TAG_VERSION="${TAG_NAME#v}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "✗ tag $TAG_NAME does not match package.json version ${PKG_VERSION} — align package.json first"
            exit 1
          fi
          echo "✓ tag matches package.json version $PKG_VERSION, proceeding with build"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Build binaries
        env:
          TANKA_API_URL_PROD: ${{ secrets.TANKA_API_URL_PROD }}
          TANKA_API_URL_DEV: ${{ secrets.TANKA_API_URL_DEV }}
          TANKA_API_URL_TEST: ${{ secrets.TANKA_API_URL_TEST }}
          TANKA_API_URL_UAT: ${{ secrets.TANKA_API_URL_UAT }}
        run: bun scripts/build-binaries.mjs

      - name: List artifacts
        run: ls -la dist/

      - uses: actions/upload-artifact@v5
        with:
          name: binaries
          path: dist/
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: binaries
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release create "$TAG_NAME" \
            --repo "$REPO" \
            --title "tanka-wm $TAG_NAME" \
            --notes "tanka-wm $TAG_NAME — self-contained binaries (no node/bun required). Install: download the file for your platform, \`chmod +x\`, and place it on your PATH." \
            dist/tanka-wm-darwin-arm64 \
            dist/tanka-wm-darwin-x64 \
            dist/tanka-wm-linux-x64 \
            dist/tanka-wm-linux-arm64 \
            dist/tanka-wm-windows-x64.exe \
            dist/tanka-wm-windows-arm64.exe \
            dist/checksums-sha256.txt
